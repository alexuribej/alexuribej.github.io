<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Alfera — Fichas Técnicas</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #1A1A2E;
    --azul2: #1B3A6B;
    --acento: #4A90D9;
    --blanco: #ffffff;
    --gris: #f4f6fa;
    --texto: #1a1a2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: #eef2f7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px;
  }

  /* ── PANEL DE INGRESO ── */
  .panel {
    background: white;
    border-radius: 16px;
    padding: 36px;
    max-width: 780px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .panel-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .panel-header img { height: 44px; object-fit: contain; }
  .panel-header h1 { font-size: 1.4rem; font-weight: 700; color: var(--azul); }
  .panel-header p { font-size: 0.85rem; color: #666; }

  .product-row {
    background: var(--gris);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .product-row label { font-size: 0.8rem; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
  .product-row input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #dde3ed;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.92rem;
    color: var(--texto);
    outline: none;
    transition: border 0.2s;
  }
  .product-row input[type="text"]:focus { border-color: var(--acento); }

  .row-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .btn-img {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1.5px solid #c5d0e0;
    background: white;
    font-family: 'Outfit', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: #444;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-img:hover { border-color: var(--acento); color: var(--acento); }
  .img-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .img-preview img { height: 56px; width: 56px; object-fit: cover; border-radius: 6px; border: 1.5px solid #dde; }
  .btn-remove {
    background: none; border: none; cursor: pointer;
    color: #c00; font-size: 0.75rem; margin-left: auto;
    padding: 4px 8px; border-radius: 6px;
  }
  .btn-remove:hover { background: #fee; }

  .btn-add-product {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 18px; border-radius: 9px;
    border: 1.5px dashed #aab8cc;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    font-size: 0.88rem; color: #5a7090; cursor: pointer;
    transition: all 0.2s; margin-top: 4px;
  }
  .btn-add-product:hover { border-color: var(--acento); color: var(--acento); background: #f0f7ff; }

  .btn-generar {
    width: 100%; padding: 14px; margin-top: 22px;
    background: var(--azul2); color: white;
    border: none; border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    transition: background 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-generar:hover { background: #142f58; }
  .btn-generar:disabled { background: #9bb0cc; cursor: not-allowed; }

  /* ── FICHAS GENERADAS ── */
  #fichas-container { max-width: 860px; width: 100%; margin-top: 30px; }

  .ficha {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 30px;
    box-shadow: 0 6px 32px rgba(0,0,0,0.1);
    page-break-after: always;
  }

  /* Encabezado ficha */
  .ficha-header {
    background: var(--azul);
    padding: 20px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
  }
  .ficha-header-logo img { height: 42px; filter: brightness(0) invert(1); }
  .ficha-header-info { text-align: right; }
  .ficha-header-info .label {
    font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 1.5px; color: #8ba8cc; margin-bottom: 4px;
  }
  .ficha-header-info .nombre {
    font-size: 1.1rem; font-weight: 700; color: white; line-height: 1.2;
  }
  .ficha-header-info .condicion {
    display: inline-block;
    margin-top: 6px; padding: 3px 10px;
    border-radius: 20px; font-size: 0.72rem;
    font-weight: 600; letter-spacing: 0.5px;
  }
  .condicion.nuevo { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }
  .condicion.reacondicionado { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44; }

  /* Franja specs rápidos */
  .ficha-strip {
    background: var(--azul2);
    padding: 12px 28px;
    display: flex; gap: 24px; flex-wrap: wrap;
  }
  .strip-item { color: white; font-size: 0.82rem; display: flex; align-items: center; gap: 6px; }
  .strip-item span { opacity: 0.65; }

  /* Cuerpo ficha */
  .ficha-body {
    display: grid;
    grid-template-columns: 38% 62%;
    min-height: 360px;
  }
  .ficha-left {
    background: var(--gris);
    padding: 22px 18px;
    display: flex; flex-direction: column; gap: 16px;
    border-right: 1px solid #e0e8f0;
  }
  .ficha-imgs { display: flex; gap: 10px; flex-wrap: wrap; }
  .ficha-imgs img {
    width: calc(50% - 5px); aspect-ratio: 1;
    object-fit: contain; border-radius: 10px;
    background: white; border: 1px solid #dde; padding: 6px;
  }
  .ficha-imgs img:only-child { width: 100%; }

  .badge {
    display: inline-block; padding: 5px 12px;
    border-radius: 20px; font-size: 0.75rem; font-weight: 600;
  }
  .badge.nuevo { background: #dcfce7; color: #16a34a; }
  .badge.reacondicionado { background: #fef3c7; color: #d97706; }

  .resumen-rapido h4 {
    font-size: 0.72rem; text-transform: uppercase;
    letter-spacing: 1px; color: #888; margin-bottom: 10px;
  }
  .resumen-rapido table { width: 100%; border-collapse: collapse; }
  .resumen-rapido td {
    padding: 4px 0; font-size: 0.8rem; vertical-align: top;
  }
  .resumen-rapido td:first-child {
    color: #888; width: 42%; padding-right: 8px;
  }
  .resumen-rapido td:last-child { color: var(--texto); font-weight: 500; }

  /* Tabla specs */
  .ficha-right { padding: 0; }
  .specs-section { border-bottom: 1px solid #eef0f4; }
  .specs-section:last-child { border-bottom: none; }
  .specs-section-title {
    padding: 10px 20px;
    font-size: 0.72rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: white;
  }
  .s1 { background: #1B3A6B; }
  .s2 { background: #2d6a4f; }
  .s3 { background: #5b2d8e; }
  .s4 { background: #7b4f2d; }
  .s5 { background: #374151; }
  .s6 { background: #1d4e6b; }

  .specs-table { width: 100%; border-collapse: collapse; }
  .specs-table tr:nth-child(even) td { background: #f7f9fc; }
  .specs-table td {
    padding: 7px 20px; font-size: 0.82rem;
    vertical-align: top; border-bottom: 1px solid #f0f2f5;
  }
  .specs-table td:first-child {
    color: #666; width: 40%; font-weight: 500;
  }
  .specs-table td:last-child { color: var(--texto); }

  /* Pie ficha */
  .ficha-footer {
    background: var(--azul);
    padding: 12px 28px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .ficha-footer span { color: #8ba8cc; font-size: 0.75rem; }

  /* Botones acción */
  .ficha-actions {
    display: flex; gap: 10px; justify-content: flex-end;
    padding: 12px 0 0;
  }
  .btn-action {
    padding: 8px 18px; border-radius: 8px; border: none;
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-print { background: var(--azul2); color: white; }
  .btn-print:hover { background: #142f58; }

  /* Loading */
  .loading {
    display: none; text-align: center; padding: 40px;
    color: #666; font-size: 0.95rem;
  }
  .loading.active { display: block; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid #dde;
    border-top-color: var(--azul2); border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: #fee2e2; color: #b91c1c;
    padding: 12px 16px; border-radius: 8px;
    font-size: 0.85rem; margin-top: 12px;
    display: none;
  }
  .error-msg.active { display: block; }

  @media print {
    body { background: white; padding: 0; }
    .panel, .ficha-actions, #btn-generar-wrapper { display: none !important; }
    .ficha { box-shadow: none; border-radius: 0; margin: 0; page-break-after: always; }
  }
</style>
</head>
<body>

<!-- Panel ingreso -->
<div class="panel">
  <div class="panel-header">
    <div>
      <h1>Fichas Técnicas</h1>
      <p>Grupo Alfera · Ingresa los links de productos a procesar</p>
    </div>
  </div>

  <div id="productos-list">
    <!-- Producto 1 -->
    <div class="product-row" data-idx="0">
      <label>Producto 1 — Link</label>
      <input type="text" class="link-input" placeholder="https://tienda.cl/producto...">
      <div class="row-actions">
        <label class="btn-img">
          📷 Agregar imagen
          <input type="file" accept="image/*" multiple style="display:none" onchange="previewImgs(this, 0)">
        </label>
        <button class="btn-remove" onclick="removeProducto(this)">✕ Quitar</button>
      </div>
      <div class="img-preview" id="preview-0"></div>
    </div>
  </div>

  <button class="btn-add-product" onclick="addProducto()">＋ Agregar otro producto</button>

  <div id="error-msg" class="error-msg"></div>

  <div id="btn-generar-wrapper">
    <button class="btn-generar" id="btn-generar" onclick="generarFichas()">
      ⚡ Generar fichas técnicas
    </button>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  Analizando productos y generando fichas...
</div>

<div id="fichas-container"></div>

<script>
const WORKER_URL = 'https://alfera-proxy.alex-uribej.workers.dev/';
let productCount = 1;
let imagesByProduct = {}; // { idx: [dataURL, ...] }

function addProducto() {
  const idx = productCount++;
  const list = document.getElementById('productos-list');
  const div = document.createElement('div');
  div.className = 'product-row';
  div.dataset.idx = idx;
  div.innerHTML = `
    <label>Producto ${idx+1} — Link</label>
    <input type="text" class="link-input" placeholder="https://tienda.cl/producto...">
    <div class="row-actions">
      <label class="btn-img">
        📷 Agregar imagen
        <input type="file" accept="image/*" multiple style="display:none" onchange="previewImgs(this, ${idx})">
      </label>
      <button class="btn-remove" onclick="removeProducto(this)">✕ Quitar</button>
    </div>
    <div class="img-preview" id="preview-${idx}"></div>
  `;
  list.appendChild(div);
}

function removeProducto(btn) {
  const row = btn.closest('.product-row');
  const idx = row.dataset.idx;
  delete imagesByProduct[idx];
  row.remove();
}

function previewImgs(input, idx) {
  const container = document.getElementById('preview-' + idx);
  if (!imagesByProduct[idx]) imagesByProduct[idx] = [];
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      imagesByProduct[idx].push(e.target.result);
      const img = document.createElement('img');
      img.src = e.target.result;
      container.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

async function generarFichas() {
  const rows = document.querySelectorAll('.product-row');
  const productos = [];
  rows.forEach(row => {
    const idx = row.dataset.idx;
    const link = row.querySelector('.link-input').value.trim();
    if (link) productos.push({ idx, link, imgs: imagesByProduct[idx] || [] });
  });

  if (!productos.length) {
    mostrarError('Por favor ingresa al menos un link de producto.');
    return;
  }

  document.getElementById('btn-generar').disabled = true;
  document.getElementById('loading').classList.add('active');
  document.getElementById('error-msg').classList.remove('active');
  document.getElementById('fichas-container').innerHTML = '';

  for (const prod of productos) {
    try {
      const ficha = await analizarProducto(prod.link);
      renderFicha(ficha, prod.imgs);
    } catch(e) {
      mostrarError('Error al procesar: ' + prod.link + ' — ' + e.message);
    }
  }

  document.getElementById('loading').classList.remove('active');
  document.getElementById('btn-generar').disabled = false;
}

async function analizarProducto(link) {
  const prompt = `Eres un asistente técnico que genera fichas de productos para una empresa distribuidora.

Analiza este link de producto: ${link}

Extrae TODA la información técnica disponible del producto. Si no puedes acceder al link, deduce el producto desde la URL y usa tu conocimiento sobre ese modelo.

IMPORTANTE:
- NO menciones el precio
- NO menciones la tienda, proveedor ni sitio web
- Detecta automáticamente el tipo de producto (computador, impresora, tóner, mueble, electrodoméstico, etc.)
- Incluye SOLO los campos que aplican al tipo de producto

Responde ÚNICAMENTE con un objeto JSON válido (sin markdown, sin texto extra):
{
  "nombre": "nombre completo del producto con marca y modelo",
  "marca": "marca del producto",
  "condicion": "Nuevo" o "Reacondicionado Grado A" etc,
  "descripcion": "descripción breve del producto",
  "tipo": "tipo de producto",
  "specs_rapidos": {
    "campo1": "valor1",
    "campo2": "valor2"
  },
  "secciones": [
    {
      "titulo": "NOMBRE SECCIÓN",
      "color": "s1",
      "filas": [
        {"campo": "Nombre del campo", "valor": "Valor del campo"}
      ]
    }
  ]
}

Para las secciones usa colores s1 a s6. Crea secciones relevantes al tipo de producto. Ejemplos:
- Computador: PROCESADOR, MEMORIA Y ALMACENAMIENTO, PANTALLA Y GRÁFICOS, CONECTIVIDAD Y PUERTOS, SISTEMA OPERATIVO, DIMENSIONES E INCLUYE
- Tóner/Tinta: IDENTIFICACIÓN, COMPATIBILIDAD, RENDIMIENTO, CARACTERÍSTICAS
- Electrodoméstico: CARACTERÍSTICAS PRINCIPALES, ESPECIFICACIONES TÉCNICAS, DIMENSIONES E INCLUYE
- Cualquier otro: adapta las secciones al tipo de producto

En specs_rapidos incluye 3-5 datos clave del producto (los más importantes).
Cada sección debe tener entre 3 y 8 filas con datos reales y útiles.`;

  const response = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!response.ok) throw new Error('Error del servidor: ' + response.status);
  const data = await response.json();

  let texto = '';
  if (data.content && data.content[0]) {
    texto = data.content[0].text;
  } else if (data.choices && data.choices[0]) {
    texto = data.choices[0].message.content;
  } else {
    throw new Error('Respuesta inesperada del servidor');
  }

  // Limpiar markdown si viene
  texto = texto.replace(/```json/g,'').replace(/```/g,'').trim();
  return JSON.parse(texto);
}

function renderFicha(d, imgs) {
  const container = document.getElementById('fichas-container');
  const condClass = (d.condicion||'').toLowerCase().includes('reacon') ? 'reacondicionado' : 'nuevo';

  // Specs rápidos strip
  const stripItems = Object.entries(d.specs_rapidos || {}).map(([k,v]) =>
    `<div class="strip-item"><span>${k}:</span> ${v}</div>`
  ).join('');

  // Imágenes
  let imgsHtml = '';
  if (imgs && imgs.length) {
    imgsHtml = imgs.map(src => `<img src="${src}" alt="Producto">`).join('');
  } else {
    imgsHtml = `<div style="width:100%;aspect-ratio:1;background:#e8edf5;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#aab;font-size:2.5rem;">📦</div>`;
  }

  // Resumen rápido
  const resumenRows = Object.entries(d.specs_rapidos || {}).map(([k,v]) =>
    `<tr><td>${k}</td><td>${v}</td></tr>`
  ).join('');

  // Secciones specs
  const seccionesHtml = (d.secciones || []).map(s => `
    <div class="specs-section">
      <div class="specs-section-title ${s.color}">${s.titulo}</div>
      <table class="specs-table">
        ${(s.filas||[]).map(f => `<tr><td>${f.campo}</td><td>${f.valor}</td></tr>`).join('')}
      </table>
    </div>
  `).join('');

  const ficha = document.createElement('div');
  ficha.className = 'ficha';
  ficha.innerHTML = `
    <div class="ficha-header">
      <div class="ficha-header-logo">
        <span style="color:white;font-size:1.3rem;font-weight:800;letter-spacing:1px;">GRUPO ALFERA</span>
      </div>
      <div class="ficha-header-info">
        <div class="label">Ficha Técnica de Producto</div>
        <div class="nombre">${d.nombre || 'Producto'}</div>
        <span class="condicion ${condClass}">${d.condicion || 'Nuevo'}</span>
      </div>
    </div>

    <div class="ficha-strip">
      ${stripItems || `<div class="strip-item">${d.descripcion||''}</div>`}
    </div>

    <div class="ficha-body">
      <div class="ficha-left">
        <div class="ficha-imgs">${imgsHtml}</div>
        <span class="badge ${condClass}">${d.condicion || 'Nuevo'}</span>
        <div class="resumen-rapido">
          <h4>Resumen rápido</h4>
          <table>${resumenRows}</table>
        </div>
      </div>
      <div class="ficha-right">
        ${seccionesHtml}
      </div>
    </div>

    <div class="ficha-footer">
      <span>Grupo Alfera · Equipo certificado · Sujeto a stock</span>
      <span>${d.marca || ''}</span>
    </div>
  `;

  const actions = document.createElement('div');
  actions.className = 'ficha-actions';
  actions.innerHTML = `<button class="btn-action btn-print" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>`;

  container.appendChild(ficha);
  container.appendChild(actions);
}

function mostrarError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('active');
}
</script>
</body>
</html>
