<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Alfera | Soluciones Integrales</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1f2a44;
        }
        .container {
            background: white;
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        img {
            width: 200px;
            margin-bottom: 25px;
        }
        h1 {
            font-size: 26px;
            margin-bottom: 15px;
            color: #1f2a44;
        }
        p {
            font-size: 16px;
            color: #5e6d82;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-contact {
            display: inline-block;
            background-color: #1f2a44;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-contact:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        .footer-mail {
            display: block;
            margin-top: 20px;
            font-size: 14px;
            color: #0056b3;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Grupo Alfera.jpg" alt="Logo Grupo Alfera">
        <h1>Soluciones Estratégicas</h1>
        <p>Estamos transformando nuestra plataforma para ofrecerte la mejor experiencia en comercialización y logística.</p>
        <a href="mailto:contacto@grupoalfera.cl" class="btn-contact">Enviar Mensaje</a>
        <a href="mailto:contacto@grupoalfera.cl" class="footer-mail">contacto@grupoalfera.cl</a>
    </div>
</body>
</html>
