<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Alfera — Generador de Fichas Técnicas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --azul: #1A1A2E; --celeste: #7DAEDC; --bg: #F4F7FA; --texto: #1A1A2E; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--texto); }
        .header { background: var(--azul); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; color: white; }
        .logo { height: 45px; filter: brightness(0) invert(1); }
        .main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        
        .card { background: white; padding: 2rem; border-radius: 18px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* Contenedor de Fila de Producto */
        .producto-row { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 12px; border: 1px solid #e2e8f0; }
        input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.9rem; }
        
        /* Botón de Imagen al costado */
        .btn-img { width: 50px; height: 50px; border: 1.5px dashed #cbd5e1; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: white; overflow: hidden; position: relative; }
        .btn-img img { width: 100%; height: 100%; object-fit: cover; }
        .btn-img span { font-size: 1.2rem; color: #94a3b8; }

        .btn-del { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 1.2rem; padding: 5px; }
        .btn-del:hover { color: #e11d48; }

        .btn-add { width: 100%; padding: 12px; background: none; border: 2px dashed #cbd5e1; color: #64748b; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .btn-add:hover { border-color: var(--celeste); color: var(--azul); }

        .gen-btn { width: 100%; padding: 18px; background: var(--azul); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        
        #pdf-container { display: none; }
        .page-break { page-break-after: always; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://grupoalfera.cl/wp-content/uploads/2024/02/logo-alfera-blanco.png" class="logo">
    <span style="font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;">GENERADOR DE FICHAS TÉCNICAS</span>
</div>

<div class="main">
    <div class="card">
        <div id="lista-productos">
            <div class="producto-row">
                <input type="text" class="prod-url" placeholder="Pega el link del producto aquí...">
                <div class="btn-img" onclick="this.querySelector('input').click()">
                    <span>+</span>
                    <input type="file" hidden accept="image/*" onchange="previewImg(this)">
                    <img style="display:none">
                </div>
                <button class="btn-del" onclick="this.parentElement.remove()">✕</button>
            </div>
        </div>

        <button class="btn-add" onclick="agregarFila()">+ Agregar otro producto</button>
        <button class="gen-btn" onclick="generarTodo()">Generar Fichas Técnicas →</button>
        <p id="status" style="text-align: center; margin-top: 15px; color: #64748b; font-size: 0.9rem;"></p>
    </div>
</div>

<div id="pdf-container"></div>

<script>
function agregarFila() {
    const div = document.createElement('div');
    div.className = 'producto-row';
    div.innerHTML = `
        <input type="text" class="prod-url" placeholder="Pega el link del producto aquí...">
        <div class="btn-img" onclick="this.querySelector('input').click()">
            <span>+</span>
            <input type="file" hidden accept="image/*" onchange="previewImg(this)">
            <img style="display:none">
        </div>
        <button class="btn-del" onclick="this.parentElement.remove()">✕</button>
    `;
    document.getElementById('lista-productos').appendChild(div);
}

function previewImg(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        const container = input.parentElement;
        reader.onload = (e) => {
            const img = container.querySelector('img');
            const span = container.querySelector('span');
            img.src = e.target.result;
            img.style.display = 'block';
            span.style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }
}
