<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Alfera — Generador de Fichas Técnicas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --azul: #1A1A2E;
    --azul2: #1B3A6B;
    --bg: #F4F6FA;
    --card: #FFFFFF;
    --border: #E0E6F0;
    --text: #1A1A2E;
    --muted: #6B7A99;
    --acento: #2D6FAD;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header {
    background: var(--azul);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 70px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 15px; }
  .header img { height: 32px; filter: brightness(0) invert(1); }
  .header-title { color: #7DAEDC; font-size: 13px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 15px; }

  /* MAIN */
  .main { max-width: 750px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  .hero { margin-bottom: 2rem; }
  .hero h1 { font-size: 28px; font-weight: 600; color: var(--azul); margin-bottom: 8px; }
  .hero p { font-size: 15px; color: var(--muted); }

  /* CARD */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
  .card-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px; }

  /* FILAS DE PRODUCTOS */
  .url-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; background: #f8fafc; padding: 10px; border-radius: 12px; border: 1px solid #e2e8f0; }
  .url-input { flex: 1; height: 42px; border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; font-family: 'DM Mono', monospace; font-size: 12px; outline: none; }
  
  .btn-img { width: 42px; height: 42px; border: 1.5px dashed var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: white; overflow: hidden; position: relative; }
  .btn-img img { width: 100%; height: 100%; object-fit: cover; position: absolute; display: none; }
  .btn-img span { font-size: 1.2rem; color: #94a3b8; }

  .add-link { width: 100%; height: 42px; border: 2px dashed var(--border); border-radius: 10px; background: transparent; cursor: pointer; font-family: 'DM Sans'; font-size: 13px; color: var(--muted); font-weight: 600; margin-top: 10px; }

  /* BOTÓN GENERAR */
  .gen-btn {
    width: 100%; height: 56px; background: var(--azul); color: #fff; border: none;
    border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 1.5rem;
    transition: 0.2s;
  }
  .gen-btn:hover { background: var(--azul2); }

  /* LOADING */
  .loading { display: none; text-align: center; padding: 2rem; }
  .loading.show { display: block; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--azul); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #pdf-preview { display: none; }
  .page-break { page-break-after: always; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="https://grupoalfera.cl/wp-content/uploads/2024/02/logo-alfera-blanco.png" alt="Grupo Alfera">
    <div class="header-title">Generador de Fichas</div>
  </div>
</div>

<div class="main">
  <div class="hero">
    <h1>Fichas técnicas corporativas</h1>
    <p>Ingrese los links y cargue las imágenes de los productos para generar el PDF.</p>
  </div>

  <div class="card">
    <div class="card-label">Lista de Productos</div>
    <div id="url-container">
      <div class="url-row">
        <input type="text" class="url-input" placeholder="Pega el link del producto aquí...">
        <div class="btn-img" onclick="this.querySelector('input').click()">
          <span>+</span>
          <input type="file" hidden accept="image/*" onchange="previewImg(this)">
          <img alt="Preview">
        </div>
      </div>
    </div>
    <button class="add-link" onclick="agregarFila()">+ Agregar otro producto</button>
  </div>

  <button class="gen-btn" id="btn-generate" onclick="generarFichas()">
    Generar PDF Corporativo
  </button>

  <div class="loading" id="loading-area">
    <div class="spinner"></div>
    <p id="status-text">Procesando información...</p>
  </div>

  <div id="pdf-preview"></div>
</div>

<script>
  // La clave se mantiene privada dentro del código
  const AI_KEY = "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";

  function agregarFila() {
    const container = document.getElementById('url-container');
    const div = document.createElement('div');
    div.className = 'url-row';
    div.innerHTML = `
        <input type="text" class="url-input" placeholder="Pega el link del producto aquí...">
        <div class="btn-img" onclick="this.querySelector('input').click()">
          <span>+</span>
          <input type="file" hidden accept="image/*" onchange="previewImg(this)">
          <img alt="Preview">
        </div>
    `;
    container.appendChild(div);
  }

  function previewImg(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      const parent = input.parentElement;
      reader.onload = (e) => {
        const img = parent.querySelector('img');
        const span = parent.querySelector('span');
        img.src = e.target.result;
        img.style.display = 'block';
        span.style.display = 'none';
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  async function generarFichas() {
    const filas = document.querySelectorAll('.url-row');
    const btn = document.getElementById('btn-generate');
    const loading = document.getElementById('loading-area');
    const status = document.getElementById('status-text');
    const preview = document.getElementById('pdf-preview');
    
    preview.innerHTML = "";
    btn.style.display = "none";
    loading.classList.add("show");

    for (let i = 0; i < filas.length; i++) {
      const url = filas[i].querySelector('.url-input').value;
      const imgData = filas[i].querySelector('img').src || "https://via.placeholder.com/300";
      
      if (!url) continue;

      status.innerText = `Analizando producto ${i + 1}...`;

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${AI_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            "model": "google/gemini-2.0-flash-001",
            "messages": [
              { "role": "user", "content": `Analiza este link: ${url}. Genera una ficha técnica para Grupo Alfera: 1. Nombre. 2. Descripción comercial. 3. Tabla HTML de especificaciones clave. No incluyas precios.` }
            ]
          })
        });

        const data = await response.json();
        const content = data.choices[0].message.content;

        const page = document.createElement('div');
        page.className = 'page-break';
        page.style.padding = "50px";
        page.style.backgroundColor = "white";
        page.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1A1A2E; padding-bottom: 15px; margin-bottom: 30px;">
            <img src="https://grupoalfera.cl/wp-content/uploads/2024/02/logo-alfera-color.png" style="height: 45px;">
            <span style="font-size: 10px; color: #666; text-align: right; font-family: sans-serif;">GRUPO ALFERA SpA<br>Venta de Tecnología e Insumos</span>
          </div>
          <div style="display: flex; gap: 40px;">
            <div style="width: 280px; flex-shrink: 0;">
              <img src="${imgData}" style="width: 100%; border-radius: 12px; border: 1px solid #e2e8f0;">
            </div>
            <div style="flex: 1; font-size: 13px; color: #1A1A2E; font-family: sans-serif;">
              ${content.replace(/```html|```/g, "")}
            </div>
          </div>
          <div style="position: absolute; bottom: 50px; left: 50px; right: 50px; border-top: 1px solid #eee; padding-top: 15px; font-size: 9px; color: #999; display: flex; justify-content: space-between; font-family: sans-serif;">
            <span>www.grupoalfera.cl</span>
            <span>Ficha Técnica Generada para Procesos de Compra</span>
          </div>
        `;
        preview.appendChild(page);
      } catch (error) {
        console.error(error);
      }
    }

    const opt = {
      margin: 0,
      filename: 'Fichas_Tecnicas_Alfera.pdf',
      html2canvas: { scale: 2 },
      jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(preview).save().then(() => {
      loading.classList.remove("show");
      btn.style.display = "block";
    });
  }
</script>

</body>
</html>
