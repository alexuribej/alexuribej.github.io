<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Alfera — Generador de Fichas Técnicas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --azul: #1A1A2E; --blanco: #FFFFFF; --gris: #F4F7FA; }
        body { font-family: 'DM Sans', sans-serif; background: var(--gris); margin: 0; padding: 20px; }
        .header { background: var(--azul); color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 15px; background: var(--azul); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #252545; }
        #preview { display: none; } /* Oculto en pantalla, se usa para el PDF */
    </style>
</head>
<body>

<div class="header">
    <img src="https://grupoalfera.cl/logo.png" alt="Grupo Alfera" style="height: 40px;">
    <span>GENERADOR DE FICHAS TÉCNICAS</span>
</div>

<div class="container">
    <h2>Fichas técnicas en segundos</h2>
    <p>Pega el link del producto para generar el PDF oficial.</p>
    
    <input type="text" id="productUrl" placeholder="https://www.mercadolibre.cl/producto...">
    <button onclick="generarPDF()">⚡ Generar Ficha en PDF</button>
    
    <p id="status" style="margin-top: 15px; font-size: 14px; color: #666;"></p>
</div>

<div id="ficha-diseno" style="padding: 40px; color: #333; font-family: Arial, sans-serif; display: none;">
    <div style="border-bottom: 2px solid #1A1A2E; padding-bottom: 10px; margin-bottom: 20px;">
        <h1 id="pdf-titulo" style="color: #1A1A2E;">Nombre del Producto</h1>
    </div>
    <div id="pdf-contenido" style="line-height: 1.6;">
        </div>
    <div style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 10px; font-size: 12px; color: #999;">
        Documento generado oficialmente por Grupo Alfera.
    </div>
</div>

<script>
async function generarPDF() {
    const url = document.getElementById('productUrl').value;
    const status = document.getElementById('status');
    
    if(!url) return alert("Pega un link primero");

    status.innerText = "Buscando información y conectando con IA...";

    try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer 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", // Tu clave OpenRouter
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                "model": "google/gemini-2.0-flash-001",
                "messages": [
                    {"role": "user", "content": `Genera una ficha técnica profesional para este producto: ${url}. Devuelve solo el texto técnico en puntos clave, sin links ni precios.`}
                ]
            })
        });

        const data = await response.json();
        const textoIA = data.choices[0].message.content;

        // Llenar el diseño de la ficha
        document.getElementById('pdf-contenido').innerText = textoIA;
        const elemento = document.getElementById('ficha-diseno');
        elemento.style.display = 'block';

        status.innerText = "¡Información obtenida! Convirtiendo a PDF...";

        // Configuración de PDF
        const opciones = {
            margin: 1,
            filename: 'Ficha_Tecnica_Alfera.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };

        // Descargar PDF
        await html2pdf().set(opciones).from(elemento).save();
        
        elemento.style.display = 'none';
        status.innerText = "✅ PDF descargado con éxito.";

    } catch (error) {
        console.error(error);
        status.innerText = "Error al generar. Revisa tu saldo en OpenRouter.";
    }
}
</script>

</body>
</html>
