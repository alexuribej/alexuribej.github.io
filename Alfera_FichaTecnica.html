<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Alfera — Fichas Técnicas</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #f0f4f8; padding: 20px; color: #1a2e42; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        header { border-bottom: 2px solid #0d1b2a; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.2rem; margin: 0; color: #0d1b2a; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #d1dce8; border-radius: 8px; font-family: inherit; }
        textarea { height: 120px; }
        button { width: 100%; padding: 15px; background: #1e6fb5; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:hover { background: #155a94; }
        #resultado { display: none; margin-top: 30px; border: 1px solid #000; padding: 20px; background: #fff; }
        .ficha-title { border-bottom: 1px solid #000; margin-bottom: 15px; padding-bottom: 5px; }
        @media print { .no-print { display: none; } #resultado { border: none; display: block !important; } }
    </style>
</head>
<body>

<div class="container no-print">
    <header>
        <h1>GRUPO ALFERA — GENERADOR PRO</h1>
        <span style="font-size: 0.8rem; font-weight: bold; color: #f5a623;">MODO LICITACIONES</span>
    </header>

    <input type="text" id="marca" placeholder="Marca del producto (Ej: HP, Stanley)">
    <input type="text" id="url" placeholder="URL del producto (Referencia)">
    <textarea id="contenido" placeholder="Pega aquí toda la descripción y especificaciones técnicas que copiaste del proveedor..."></textarea>
    
    <button id="btn" onclick="generarFicha()">GENERAR FICHA TÉCNICA</button>
</div>

<div id="resultado">
    <div class="ficha-title">
        <h2 id="out_nombre">NOMBRE DEL PRODUCTO</h2>
        <p><strong>Grupo Alfera Trade SpA</strong></p>
    </div>
    <p><strong>Marca:</strong> <span id="out_marca"></span></p>
    <p><strong>Descripción:</strong></p>
    <p id="out_desc"></p>
    <div id="out_specs"></div>
    <br>
    <button class="no-print" onclick="window.print()" style="background: #22c55e;">Imprimir / Guardar PDF</button>
</div>

<script>
async function generarFicha() {
    const btn = document.getElementById('btn');
    const contenido = document.getElementById('contenido').value;
    const marca = document.getElementById('marca').value;
    const url = document.getElementById('url').value;

    if(!contenido || !marca) return alert("Pega la descripción y escribe la marca");

    btn.innerText = "PROCESANDO...";
    btn.disabled = true;

    const prompt = `Eres un generador de especificaciones técnicas profesionales. Devuelve SOLO JSON válido.
    {
      "nombre": "Nombre comercial",
      "descripcion": "Resumen profesional",
      "especificaciones": {"Peso": "1kg", "Material": "Acero"}
    }
    Información: ${contenido} Marca: ${marca}`;

    try {
        const response = await fetch("https://alfera-proxy.alferatrade.workers.dev/", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: [{ role: "user", content: prompt }] })
        });

        const raw = await response.json();
        const text = raw.content[0].text;
        const data = JSON.parse(text);

        document.getElementById('resultado').style.display = 'block';
        document.getElementById('out_nombre').innerText = data.nombre;
        document.getElementById('out_marca').innerText = marca;
        document.getElementById('out_desc').innerText = data.descripcion;
        
        let htmlSpecs = "<ul>";
        for (const [key, value] of Object.entries(data.especificaciones)) {
            htmlSpecs += `<li><strong>${key}:</strong> ${value}</li>`;
        }
        htmlSpecs += "</ul>";
        document.getElementById('out_specs').innerHTML = htmlSpecs;

    } catch (e) {
        alert("Error al procesar. Verifica tu Worker.");
    } finally {
        btn.innerText = "GENERAR FICHA TÉCNICA";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
