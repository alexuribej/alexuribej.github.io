<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Alfera — Generador de Fichas Técnicas</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0d1b2a; --navy2: #1a2e42; --blue: #1e6fb5; --accent: #f5a623;
            --light: #f0f4f8; --white: #ffffff; --text: #1a2e42; --muted: #6b7a8d;
            --border: #d1dce8; --success: #22c55e; --error: #ef4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--light); color:var(--text); padding-bottom: 50px; }
        
        header { background:var(--navy); padding:16px 32px; display:flex; align-items:center; justify-content:space-between; color: white; }
        .logo-text { font-family:'Syne',sans-serif; font-weight:700; }

        main { max-width:820px; margin:0 auto; padding:40px 20px; }
        .card { background:var(--white); border-radius:16px; padding:28px; margin-bottom:20px; box-shadow:0 2px 12px rgba(0,0,0,.06); border:1px solid var(--border); }
        
        input, textarea { 
            width:100%; border:1.5px solid var(--border); border-radius:8px; padding:12px; 
            font-size:.9rem; margin-bottom: 12px; outline:none;
        }
        textarea { height: 150px; resize: vertical; }

        .btn-generate { 
            background: var(--blue); color: white; border: none; padding: 15px; 
            border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem;
        }
        .btn-generate:hover { background: #155a94; }

        /* Estilo de la Ficha Generada */
        #resultado { display: none; margin-top: 30px; background: white; padding: 40px; border: 1px solid #000; }
        .ficha-header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        .ficha-section { margin-bottom: 20px; }
        .ficha-section h4 { text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px; }
        
        @media print {
            header, .card, .btn-generate { display: none; }
            #resultado { display: block; border: none; padding: 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-wrap">
        <span class="logo-text">GRUPO ALFERA</span>
    </div>
    <span class="header-tag">Ficha Técnica Pro</span>
</header>

<main>
    <div class="card">
        <h3 style="margin-bottom: 15px; font-family: 'Syne';">DATOS DEL PRODUCTO</h3>
        
        <input type="text" id="marca" placeholder="Marca del producto (Ej: HP, Stanley, Bosch)">
        <input type="text" id="modelo" placeholder="Modelo o Código de parte (Opcional)">
        <input type="text" id="url" placeholder="URL de referencia (Opcional)">
        
        <p style="font-size: 0.8rem; color: var(--muted); margin-bottom: 5px;">PEGA AQUÍ LA DESCRIPCIÓN DEL PROVEEDOR:</p>
        <textarea id="contenido" placeholder="Copia y pega aquí todo el texto, especificaciones y detalles que encuentres en la página del proveedor..."></textarea>
        
        <button class="btn-generate" onclick="generarFicha()">GENERAR FICHA TÉCNICA</button>
    </div>

    <div id="resultado">
        <div class="ficha-header">
            <div>
                <h1 style="font-size: 1.5rem; margin: 0;">ESPECIFICACIONES TÉCNICAS</h1>
                <p>Grupo Alfera - División Licitaciones</p>
            </div>
            <div style="text-align: right;">
                <p id="fecha_actual"></p>
            </div>
        </div>

        <div class="ficha-section">
            <h2 id="out_nombre" style="margin-bottom: 10px; color: var(--navy);"></h2>
            <p><strong>Marca:</strong> <span id="out_marca"></span></p>
            <p><strong>Modelo:</strong> <span id="out_modelo"></span></p>
        </div>

        <div class="ficha-section">
            <h4>Descripción del Producto</h4>
            <p id="out_descripcion"></p>
        </div>

        <div class="ficha-section">
            <h4>Características Principales</h4>
            <ul id="out_caracteristicas" style="padding-left: 20px;"></ul>
        </div>

        <div class="ficha-section">
            <h4>Especificaciones Técnicas</h4>
            <div id="out_especificaciones" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
        </div>

        <button onclick="window.print()" style="margin-top:20px; padding: 10px; cursor:pointer;">Imprimir o Guardar PDF</button>
    </div>
</main>

<script>
async function generarFicha() {
    const contenido = document.getElementById("contenido").value;
    const marca = document.getElementById("marca").value;
    const modelo = document.getElementById("modelo").value;
    const btn = document.querySelector(".btn-generate");

    if (!contenido || !marca) {
        alert("Por favor, ingresa al menos la Marca y pega la Descripción.");
        return;
    }

    btn.innerText = "PROCESANDO CON IA...";
    btn.style.opacity = "0.5";

    const prompt = `Generate a technical data sheet in Spanish. Return ONLY a JSON object.
    {
      "nombre": "Technical name of product",
      "marca": "${marca}",
      "modelo": "${modelo}",
      "descripcion": "A professional 3-line summary",
      "caracteristicas": ["bullet 1", "bullet 2", "bullet 3"],
      "especificaciones": { "Key": "Value", "Key2": "Value2" }
    }
    Based on this text: ${contenido}`;

    try {
        const response = await fetch("https://alfera-proxy.alferatrade.workers.dev/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                messages: [{ role: "user", content: prompt }]
            })
        });

        const data = await response.json();
        const rawText = data.content[0].text;
        const parsed = JSON.parse(rawText);

        // Llenar Ficha
        document.getElementById("resultado").style.display = "block";
        document.getElementById("out_nombre").innerText = parsed.nombre;
        document.getElementById("out_marca").innerText = parsed.marca;
        document.getElementById("out_modelo").innerText = parsed.modelo || "N/A";
        document.getElementById("out_descripcion").innerText = parsed.descripcion;
        document.getElementById("fecha_actual").innerText = new Date().toLocaleDateString();

        // Limpiar y llenar listas
        const listCar = document.getElementById("out_caracteristicas");
        listCar.innerHTML = "";
        parsed.caracteristicas.forEach(item => {
            listCar.innerHTML += `<li>${item}</li>`;
        });

        const divEsp = document.getElementById("out_especificaciones");
        divEsp.innerHTML = "";
        Object.entries(parsed.especificaciones).forEach(([key, value]) => {
            divEsp.innerHTML += `<div><strong>${key}:</strong> ${value}</div>`;
        });

        window.scrollTo(0, document.body.scrollHeight);

    } catch (error) {
        console.error(error);
        alert("Error al generar la ficha. Revisa la consola o el Worker.");
    } finally {
        btn.innerText = "GENERAR FICHA TÉCNICA";
        btn.style.opacity = "1";
    }
}
</script>

</body>
</html>
